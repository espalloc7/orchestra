name: test

on:
  push:
  pull_request:

jobs:
  test:
    # The plugin ships to whatever machine installs it, and the hooks touch paths and
    # config files, so run the suite on all three platforms rather than just Linux.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node test/run.js
